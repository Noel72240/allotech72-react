<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#040B14"/>
  <!-- Gradient background -->
  <defs>
    <radialGradient id="bg" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00CFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#040B14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2BFF9A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#040B14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#2BFF9A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Logo box -->
  <rect x="80" y="210" width="100" height="100" rx="20" fill="url(#txt)" opacity="0.9"/>
  <text x="130" y="278" text-anchor="middle" font-family="monospace" font-weight="900" font-size="52" fill="#040B14">💻</text>
  <!-- Brand name -->
  <text x="200" y="273" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="url(#txt)">Allotech72</text>
  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="32" fill="#C8E8FF" opacity="0.8">Dépannage informatique à domicile</text>
  <text x="80" y="385" font-family="Arial, sans-serif" font-size="28" fill="#5A7A9A">Le Mans · Lombron · Sarthe</text>
  <!-- Stars -->
  <text x="80" y="460" font-size="36" fill="#FFD700">★★★★★</text>
  <text x="265" y="460" font-family="Arial, sans-serif" font-size="28" fill="#C8E8FF">32+ avis clients · Note parfaite 5/5</text>
  <!-- Phone -->
  <rect x="80" y="490" width="380" height="64" rx="12" fill="none" stroke="#00CFFF" stroke-width="2" opacity="0.5"/>
  <text x="270" y="532" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" fill="#00CFFF" font-weight="900">📞 06 13 89 39 67</text>
</svg>
